{% extends 'tracker/base.html' %}
{% block header_title %}Sign Up{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
    <div style="width: 70px; height: 70px; background: rgba(0,122,255,0.1); border-radius: 50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px;">
        <i class="fa-solid fa-user-plus" style="font-size:28px; color:var(--ios-accent);"></i>
    </div>
    <h2>Create Account</h2>
    
    {% if error %}
        <p style="color: #e74c3c; font-weight: 500;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{% url 'signup' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Choose a Username" required>

        <div style="position: relative; width: 100%;">
            <input type="password" name="password" id="signupPassword" placeholder="Create a Password" required style="padding-right: 40px;">
            <button type="button" onclick="togglePassword('signupPassword', 'signupEye')" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--ios-secondary); width: auto; padding: 0; box-shadow: none; cursor: pointer;">
                <i class="fa-solid fa-eye" id="signupEye" style="font-size: 18px;"></i>
            </button>
        </div>

        <button type="submit" style="margin-top: 15px;">Sign Up</button>
    </form>
    <p style="margin-top: 20px; color: var(--ios-secondary);">Already have an account? <a href="{% url 'login' %}" style="color: var(--ios-accent); text-decoration: none; font-weight: 600;">Log in</a></p>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>
{% endblock %}
