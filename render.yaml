    name: nutritrack
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn nutritrack_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: postgresql://nutritracker_db_user:lqhi1XbHHaJPXZVC6Umfr08UUoJ6zmxW@dpg-d72fgee3jp1c73ee93dg-a/nutritracker_db
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false
