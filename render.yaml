databases:
  - name: nutritrack_db
    databaseName: nutritrack_db
    user: nutritrack_user
    plan: free

services:
  - type: web
    name: nutritrack
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn nutritrack_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: nutritrack_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
